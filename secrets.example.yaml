# Memorandum — per-source credentials.
#
# Install at /etc/memorandum/secrets.yaml (or wherever `secrets_path:` in
# config.yaml / MEMORANDUM_SECRETS_PATH env points). chmod 600 is the right
# permission — readable only by the user the MCP server runs as.
#
# Why a separate file outside the project tree:
# The MCP server itself runs as you and can read anywhere you can. The agent
# (Claude Desktop, Claude Code, any filesystem-capable MCP client) is
# typically sandboxed to the project / home directory — keeping secrets
# under /etc puts them physically outside that allowlist even though the
# user process can still read them. A credential leak via a misbehaving or
# future filesystem tool gets harder; agent-driven path traversal can't
# escape its own root.
#
# Setup (one-time):
#   sudo mkdir -p /etc/memorandum
#   sudo install -m 600 -o $USER secrets.example.yaml /etc/memorandum/secrets.yaml
#   sudo $EDITOR /etc/memorandum/secrets.yaml
#
# The source name on the left MUST match the corresponding entry in
# config.yaml. Entries here are SHALLOW-MERGED into config.yaml's
# `sources[name]` block, so anything that's a credential goes here and
# everything else (url, filters, enabled, allow_send, …) stays in
# config.yaml. Unknown source names are logged + ignored (typo defense).
sources:
  company_mattermost:
    token: "PAT-paste-your-mattermost-token-here"

  client_mattermost:
    token: "another-mattermost-token"

  work_telegram:
    token: "123456:AABBccDDeeFFggHH..."   # from @BotFather

  work_pachca:
    token: "pcat-your-pachca-token"        # Automations → API in Pachca settings

  work_email:
    password: "app-password-or-account-pwd"
